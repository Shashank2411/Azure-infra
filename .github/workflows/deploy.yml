name: Deploy Azure Infrastructure + Function App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deployinfra
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}
          resourceGroupName: rg-demo
          template: infra/main.bicep
          parameters: |
            storageAccountName=st${{ github.run_id }}

      - name: Deploy Function App Code
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.deployinfra.outputs.functionAppName }}
          package: functionapp-code