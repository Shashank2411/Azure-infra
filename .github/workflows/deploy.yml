name: Deploy Azure Infrastructure + .NET Function App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep Infrastructure
        id: deployinfra
        uses: azure/arm-deploy@v1
        with:
          subscriptionId: ${{ fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}
          resourceGroupName: rg-demo
          template: infra/main.bicep
          parameters: |
            storageAccountName=st${{ github.run_id }}

      # Build & publish .NET isolated Azure Functions
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: functionapp-code
        run: dotnet restore

      - name: Publish
        working-directory: functionapp-code
        run: dotnet publish -c Release -o ./publish

      - name: Deploy Function App Code
        uses: azure/functions-action@v1
        with:
          app-name: ${{ steps.deployinfra.outputs.functionAppName }}
          package: functionapp-code/publish